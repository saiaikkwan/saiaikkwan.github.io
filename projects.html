<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Projects by Sai Aik Kwan - Homelab networking, security, and web development projects documented on GitHub.">
    <title>Projects - Sai Aik Kwan's Lab Portfolio</title>
    
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    
    <meta property="og:title" content="Projects - Sai Aik Kwan's Lab Portfolio">
    <meta property="og:description" content="Hands-on networking, security, and web development projects from my homelab.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://saiaikkwan.github.io/projects">
    <meta property="og:image" content="https://saiaikkwan.github.io/assets/images/profile.jpg">
    
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Projects - Sai Aik Kwan">
    <meta name="twitter:description" content="Networking, security, and web development projects.">
    
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="header-placeholder"></div>
    
    <main>
        <section class="page-header">
            <div class="container">
                <h1 class="page-title"><i class="fas fa-code"></i> Homelab Projects</h1>
                <p class="page-subtitle">Hands-on networking, security, and web development projects documented on GitHub</p>
                <a href="https://github.com/saiaikkwan" target="_blank" rel="noopener noreferrer" class="github-header-link">
                    <i class="fab fa-github"></i>
                    github.com/saiaikkwan
                </a>
            </div>
        </section>

        <section class="projects-filter">
            <div class="container">
                <div class="filter-buttons">
                    <button class="filter-btn active" data-filter="all"><i class="fas fa-folder-open"></i> All Projects</button>
                    <button class="filter-btn" data-filter="webdev"><i class="fas fa-code"></i> Web Development</button>
                    <button class="filter-btn" data-filter="networking"><i class="fas fa-network-wired"></i> Networking</button>
                    <button class="filter-btn" data-filter="security"><i class="fas fa-shield-alt"></i> Security</button>
                </div>
            </div>
        </section>

        <section class="all-projects">
            <div class="container">
                <div class="projects-grid full-grid">
                    <div class="loading-spinner" style="text-align: center; grid-column: 1/-1; padding: 3rem;">
                        <div style="width: 40px; height: 40px; border: 3px solid var(--border-color); border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 1rem;"></div>
                        <p style="color: var(--text-muted);"><i class="fas fa-spinner fa-pulse"></i> Loading projects...</p>
                    </div>
                </div>
                
                <div class="more-projects-cta">
                    <p><i class="fas fa-plus-circle"></i> More projects available on my GitHub</p>
                    <a href="https://github.com/saiaikkwan" target="_blank" rel="noopener noreferrer" class="btn btn-primary">
                        <i class="fab fa-github"></i> Explore GitHub Repository <i class="fas fa-arrow-right"></i>
                    </a>
                </div>
            </div>
        </section>
    </main>
    
    <div id="footer-placeholder"></div>
    
    <script src="assets/js/main.js"></script>
</body>
</html>
